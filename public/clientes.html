<!-- public/clientes.html -->

<!DOCTYPE html>
<html>

<head>
    <title>Clientes</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-900 text-white p-10">

    <h1 class="text-3xl mb-6">Clientes WhatsApp</h1>

    <table class="w-full">

        <thead>

            <tr class="border-b border-slate-700">

                <th class="p-2">Telefono</th>
                <th class="p-2">Nombre</th>
                <th class="p-2">Fecha</th>

            </tr>

        </thead>

        <tbody id="tabla"></tbody>

    </table>

    <script>

        const token = localStorage.getItem("token");

        async function cargar() {

            const res = await fetch("/admin/clientes", {
                headers: { Authorization: "Bearer " + token }
            });

            const data = await res.json();

            const tbody = document.getElementById("tabla");

            tbody.innerHTML = data.map(c => `

<tr class="border-b border-slate-800">

<td class="p-2">${c.telefono}</td>
<td class="p-2">${c.nombre || "-"}</td>
<td class="p-2">${new Date(c.created_at).toLocaleDateString()}</td>

</tr>

`).join("");

        }

        cargar();

    </script>

</body>

</html>
