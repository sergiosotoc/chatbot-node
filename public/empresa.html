<!-- src/empresa.html -->

<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Empresa</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-[#0b0f1a] text-white p-10">
    <div class="max-w-2xl mx-auto">
        <header class="mb-10">
            <h1 class="text-3xl font-bold">Configuración de Empresa</h1>
            <p class="text-slate-500">Administra la información pública y datos bancarios.</p>
        </header>

        <div class="bg-[#0f172a] p-8 rounded-3xl border border-slate-800 shadow-2xl space-y-6">
            <div class="grid grid-cols-2 gap-4">
                <div class="col-span-2 group border-b border-slate-800 pb-2 focus-within:border-green-500 transition">
                    <label class="block text-[10px] uppercase font-bold text-slate-500 mb-1">Nombre Comercial</label>
                    <input id="nombre" class="w-full bg-transparent border-none outline-none text-lg">
                </div>

                <div class="group border-b border-slate-800 pb-2">
                    <label class="block text-[10px] uppercase font-bold text-slate-500 mb-1">WhatsApp Público</label>
                    <input id="telefono" class="w-full bg-transparent border-none outline-none">
                </div>

                <div class="group border-b border-slate-800 pb-2">
                    <label class="block text-[10px] uppercase font-bold text-slate-500 mb-1">Número Operador</label>
                    <input id="operador" class="w-full bg-transparent border-none outline-none">
                </div>
            </div>

            <div class="pt-4">
                <h3 class="text-sm font-semibold text-slate-400 mb-4 flex items-center gap-2">
                    <span class="w-1 h-1 bg-green-500 rounded-full"></span> Datos de Pago
                </h3>
                <div class="grid grid-cols-2 gap-4">
                    <div class="border-b border-slate-800 pb-2"><label
                            class="text-[10px] text-slate-500">Banco</label><input id="banco"
                            class="w-full bg-transparent outline-none"></div>
                    <div class="border-b border-slate-800 pb-2"><label
                            class="text-[10px] text-slate-500">CLABE</label><input id="clabe"
                            class="w-full bg-transparent outline-none"></div>
                </div>
            </div>

            <button onclick="guardar()"
                class="w-full bg-green-600 hover:bg-green-500 text-white font-bold py-4 rounded-2xl shadow-lg shadow-green-500/10 transition-all active:scale-[0.98]">
                Actualizar Configuración
            </button>
        </div>
    </div>
</body>

</html>
