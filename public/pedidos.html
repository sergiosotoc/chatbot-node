<!-- public/pedidos.html -->

<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Pedidos</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-900 text-white p-10">

    <h1 class="text-3xl mb-6">Pedidos</h1>

    <table class="w-full">

        <thead class="border-b border-slate-700">

            <tr>

                <th class="p-2">Folio</th>
                <th class="p-2">Cliente</th>
                <th class="p-2">Servicio</th>
                <th class="p-2">Precio</th>
                <th class="p-2">Estatus</th>
                <th class="p-2">Acciones</th>

            </tr>

        </thead>

        <tbody id="tablaPedidos"></tbody>

    </table>

    <script>

        const token = localStorage.getItem("token");

        async function cargarPedidos() {

            const res = await fetch("/admin/pedidos", {
                headers: { Authorization: "Bearer " + token }
            });

            const pedidos = await res.json();

            const tbody = document.getElementById("tablaPedidos");

            tbody.innerHTML = pedidos.map(p => `

<tr class="border-b border-slate-800">

<td class="p-2">${p.folio}</td>
<td class="p-2">${p.cliente_id}</td>
<td class="p-2">${p.servicio}</td>
<td class="p-2">$${p.precio}</td>
<td class="p-2">${p.estatus}</td>

<td class="p-2">

<button onclick="subirGuia('${p.folio}')"
class="bg-green-600 px-2 py-1 rounded">

Enviar guía

</button>

</td>

</tr>

`).join("");

        }

        async function subirGuia(folio) {

            const url = prompt("Ingresa URL de guía PDF");

            await fetch("/admin/enviar-guia", {

                method: "POST",

                headers: {
                    "Content-Type": "application/json",
                    Authorization: "Bearer " + token
                },

                body: JSON.stringify({
                    folio,
                    urlPdf: url
                })

            });

            alert("Guía enviada");

            cargarPedidos();

        }

        cargarPedidos();

    </script>

</body>

</html>
