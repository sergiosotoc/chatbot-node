<!-- public/login.html -->
<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AHSE | Acceso</title>

  <!-- Tailwind CSS compilado localmente -->
  <link href="/dist/output.css" rel="stylesheet">

  <!-- Fuentes de Google - Roboto -->
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">

  <!-- Estilos personalizados del tema -->
  <link rel="stylesheet" href="/theme.css">

  <!-- Estilos adicionales y animaciones -->
  <style>
    * {
      box-sizing: border-box;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(16px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .fade-up {
      animation: fadeUp 0.45s ease forwards;
    }

    .fade-up-2 {
      animation: fadeUp 0.45s 0.08s ease both;
    }

    /* Estilo para inputs con autocompletado */
    input:-webkit-autofill,
    input:-webkit-autofill:hover,
    input:-webkit-autofill:focus,
    input:-webkit-autofill:active {
      -webkit-box-shadow: 0 0 0 30px #0f172a inset !important;
      -webkit-text-fill-color: #e2e8f0 !important;
      transition: background-color 5000s ease-in-out 0s;
    }

    /* Tipografía Roboto */
    body {
      font-family: 'Roboto', sans-serif;
      color: #f8fafc;
      min-height: 100vh;
    }

    /* Roboto Bold 22-26px para títulos principales */
    h1,
    h2,
    .title-bold {
      font-family: 'Roboto', sans-serif;
      font-weight: 700;
      line-height: 1.3;
    }

    h1 {
      font-size: 26px;
    }

    h2 {
      font-size: 24px;
    }

    /* Roboto Medium 16-18px para etiquetas de campos */
    label,
    .label-medium {
      font-family: 'Roboto', sans-serif;
      font-weight: 500;
      font-size: 16px;
      line-height: 1.4;
      letter-spacing: 0.5px;
    }

    /* Roboto Regular 14-16px para textos explicativos */
    p,
    .text-regular,
    .text-slate-300\/85,
    .text-slate-300\/90 {
      font-family: 'Roboto', sans-serif;
      font-weight: 400;
      font-size: 15px;
      line-height: 1.5;
    }

    /* Roboto Light 12-14px para notas legales y pie de página */
    .text-light,
    .copyright,
    .text-slate-500 {
      font-family: 'Roboto', sans-serif;
      font-weight: 300;
      font-size: 13px;
      line-height: 1.5;
    }

    /* Ajustes específicos */
    .welcome-text {
      font-family: 'Roboto', sans-serif;
      font-weight: 500;
      font-size: 14px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: rgba(34, 211, 238, 0.85);
    }

    .feature-item {
      font-family: 'Roboto', sans-serif;
      font-weight: 400;
      font-size: 14px;
      line-height: 1.5;
    }

    /* Input placeholder */
    input::placeholder {
      font-family: 'Roboto', sans-serif;
      font-weight: 300;
      font-size: 14px;
      color: #64748b;
    }

    /* Botón de login */
    .login-button {
      font-family: 'Roboto', sans-serif;
      font-weight: 500;
      font-size: 16px;
      letter-spacing: 0.5px;
    }

    /* Mensaje de error */
    .error-message {
      font-family: 'Roboto', sans-serif;
      font-weight: 400;
      font-size: 14px;
    }

    /* Responsive */
    @media (max-width: 768px) {
      h1 {
        font-size: 24px;
      }

      h2 {
        font-size: 22px;
      }

      label,
      .label-medium {
        font-size: 15px;
      }

      p,
      .text-regular {
        font-size: 14px;
      }
    }
  </style>
</head>

<body class="min-h-screen flex items-center justify-center p-4 relative z-10">
  <main
    class="w-full max-w-5xl grid lg:grid-cols-2 gap-0 rounded-3xl overflow-hidden border border-slate-700/40 bg-[#0a1221]/65 backdrop-blur-xl shadow-2xl shadow-black/40 relative z-10">

    <!-- Panel izquierdo (solo visible en lg) - Con colores originales -->
    <section
      class="hidden lg:flex flex-col justify-between p-10 bg-gradient-to-br from-cyan-500/15 via-slate-900/20 to-amber-500/10 border-r border-slate-700/40">
      <div>
        <div
          class="inline-flex items-center justify-center w-14 h-14 rounded-2xl bg-cyan-400/10 border border-cyan-300/20 mb-6">
          <svg class="w-7 h-7 text-cyan-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
              d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-14L4 7m8 4v10M4 7v10l8 4" />
          </svg>
        </div>
        <h1 class="title-bold text-white">Control total de tu operación logística</h1>
        <p class="text-slate-300/85 mt-4 leading-relaxed">
          Gestiona pedidos, conversaciones y usuarios desde un solo panel seguro.
        </p>
      </div>

      <!-- Características con colores originales -->
      <div class="space-y-3">
        <p class="feature-item flex items-center gap-2 text-slate-300/90">
          <span class="w-1.5 h-1.5 rounded-full bg-cyan-300"></span>
          Seguimiento en tiempo real
        </p>
        <p class="feature-item flex items-center gap-2 text-slate-300/90">
          <span class="w-1.5 h-1.5 rounded-full bg-cyan-300"></span>
          Operación centralizada por empresa
        </p>
        <p class="feature-item flex items-center gap-2 text-slate-300/90">
          <span class="w-1.5 h-1.5 rounded-full bg-cyan-300"></span>
          Acceso por roles con token seguro
        </p>
      </div>
    </section>

    <!-- Panel derecho (formulario de login) - Con colores originales -->
    <section class="p-7 sm:p-9 lg:p-10 fade-up">
      <div class="mb-8">
        <p class="welcome-text">Bienvenido</p>
        <h2 class="title-bold text-white mt-2">Iniciar sesión</h2>
      </div>

      <!-- Formulario -->
      <div class="space-y-4 fade-up-2">
        <!-- Campo usuario -->
        <div>
          <label class="block label-medium text-slate-400 mb-2 uppercase">Usuario</label>
          <input id="username" type="text" autocomplete="username"
            class="w-full bg-slate-900/60 border border-slate-700 rounded-xl px-4 py-3 text-white outline-none transition-all duration-200 focus:border-cyan-400 focus:ring-1 focus:ring-cyan-400/30"
            placeholder="tu_usuario">
        </div>

        <!-- Campo contraseña -->
        <div>
          <label class="block label-medium text-slate-400 mb-2 uppercase">Contraseña</label>
          <input id="password" type="password" autocomplete="current-password"
            class="w-full bg-slate-900/60 border border-slate-700 rounded-xl px-4 py-3 text-white outline-none transition-all duration-200 focus:border-cyan-400 focus:ring-1 focus:ring-cyan-400/30"
            placeholder="••••••••">
        </div>

        <!-- Mensaje de error -->
        <div id="errorBox"
          class="hidden bg-red-500/10 border border-red-500/20 text-red-300 error-message px-4 py-3 rounded-xl"></div>

        <!-- Botón de login con colores originales -->
        <button id="btnLogin"
          class="w-full bg-cyan-400 hover:bg-cyan-300 active:scale-[0.985] text-slate-950 login-button py-3.5 rounded-xl transition-all duration-200 shadow-lg shadow-cyan-500/20 flex items-center justify-center gap-2 mt-2">
          <span id="btnText">Iniciar sesión</span>
        </button>
      </div>

      <!-- Copyright -->
      <p class="copyright text-slate-500 mt-8">© 2026 AHSE Paquetería</p>
    </section>
  </main>

  <!-- Scripts -->
  <script>
    // Verificar si ya existe una sesión válida
    const existingToken = localStorage.getItem("token");
    if (existingToken) {
      try {
        const payload = JSON.parse(atob(existingToken.split(".")[1]));
        if (payload.exp * 1000 > Date.now()) {
          if (payload.role === "admin") {
            window.location = "/admin/dashboard.html";
          } else {
            window.location = "/empresas/dashboard.html";
          }
        }
      } catch (error) {
        console.error("Error al verificar token:", error);
      }
    }

    // Función de login
    async function login() {
      const btn = document.getElementById("btnLogin");
      const btnText = document.getElementById("btnText");
      const errBox = document.getElementById("errorBox");

      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value;

      // Ocultar error anterior
      errBox.classList.add("hidden");

      // Validar campos
      if (!username || !password) {
        errBox.textContent = "Ingresa tu usuario y contraseña.";
        errBox.classList.remove("hidden");
        return;
      }

      // Deshabilitar botón y mostrar spinner
      btn.disabled = true;
      btnText.innerHTML = `
        <svg class="animate-spin w-4 h-4" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
        </svg>
        Verificando...
      `;

      try {
        const res = await fetch("/auth/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username, password })
        });

        const data = await res.json();

        if (!res.ok) {
          errBox.textContent = data.error || "Credenciales incorrectas.";
          errBox.classList.remove("hidden");
          return;
        }

        // Guardar token
        localStorage.setItem("token", data.token);

        // Redirigir según rol
        const role = data.user?.rol || data.user?.role;
        if (role === "admin") {
          window.location = "/admin/dashboard.html";
        } else {
          window.location = "/empresas/dashboard.html";
        }
      } catch (error) {
        console.error("Error de conexión:", error);
        errBox.textContent = "Error de conexión con el servidor.";
        errBox.classList.remove("hidden");
      } finally {
        // Restaurar botón
        btn.disabled = false;
        btnText.textContent = "Iniciar sesión";
      }
    }

    // Event listeners
    document.getElementById("btnLogin").addEventListener("click", login);
    document.addEventListener("keypress", (e) => {
      if (e.key === "Enter") {
        login();
      }
    });
  </script>

  <!-- Script del tema (elementos flotantes) -->
  <script src="/theme.js"></script>
</body>

</html>
