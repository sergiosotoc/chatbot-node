<!-- public/login.html -->
 
<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | AHSE Paquetería</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .glass {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        input:focus {
            box-shadow: 0 0 0 2px rgba(34, 197, 94, 0.2);
        }
    </style>
</head>

<body class="bg-[#0f172a] text-slate-200 min-h-screen flex items-center justify-center p-4">

    <div class="absolute top-0 left-0 w-full h-full overflow-hidden -z-10">
        <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-green-900/20 rounded-full blur-[120px]"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-blue-900/20 rounded-full blur-[120px]"></div>
    </div>

    <div class="w-full max-w-md">
        <div class="text-center mb-8">
            <div
                class="inline-flex items-center justify-center w-16 h-16 bg-green-500/10 rounded-2xl mb-4 border border-green-500/20">
                <svg class="w-8 h-8 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-14L4 7m8 4v10M4 7v10l8 4"></path>
                </svg>
            </div>
            <h1 class="text-3xl font-bold tracking-tight text-white">Panel de Control</h1>
            <p class="text-slate-400 mt-2">Ingresa tus credenciales de administrador</p>
        </div>

        <div class="glass p-8 rounded-3xl shadow-2xl">
            <div class="space-y-5">
                <div>
                    <label class="block text-sm font-medium text-slate-400 mb-1.5 ml-1">Usuario</label>
                    <input type="text" id="username"
                        class="w-full bg-slate-900/50 border border-slate-700 rounded-xl px-4 py-3 text-white placeholder:text-slate-600 outline-none transition-all focus:border-green-500"
                        placeholder="admin_ahse">
                </div>

                <div>
                    <label class="block text-sm font-medium text-slate-400 mb-1.5 ml-1">Contraseña</label>
                    <input type="password" id="password"
                        class="w-full bg-slate-900/50 border border-slate-700 rounded-xl px-4 py-3 text-white placeholder:text-slate-600 outline-none transition-all focus:border-green-500"
                        placeholder="••••••••">
                </div>

                <div id="error-container" class="hidden animate-pulse">
                    <p id="error"
                        class="text-red-400 text-sm bg-red-400/10 py-2 px-3 rounded-lg border border-red-400/20"></p>
                </div>

                <button onclick="login()" id="login-btn"
                    class="w-full bg-green-500 hover:bg-green-400 text-slate-950 font-semibold py-3.5 rounded-xl transition-all active:scale-[0.98] shadow-lg shadow-green-500/20 flex justify-center items-center">
                    <span>Acceder al Sistema</span>
                </button>
            </div>
        </div>

        <p class="text-center text-slate-500 text-xs mt-8">
            &copy; 2026 AHSE Paquetería. Todos los derechos reservados.
        </p>
    </div>

    <script>
        async function login() {
            const btn = document.getElementById("login-btn");
            const errContainer = document.getElementById("error-container");
            const errText = document.getElementById("error");

            const username = document.getElementById("username").value;
            const password = document.getElementById("password").value;

            // Estado de carga
            btn.innerHTML = `<svg class="animate-spin h-5 w-5 text-slate-950" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>`;
            btn.disabled = true;
            errContainer.classList.add("hidden");

            try {
                const res = await fetch("/auth/login", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ username, password })
                });

                const data = await res.json();

                if (res.ok) {
                    localStorage.setItem("token", data.token);
                    // Pequeño delay para feedback visual
                    setTimeout(() => window.location.href = "/dashboard.html", 500);
                } else {
                    errText.innerText = data.error;
                    errContainer.classList.remove("hidden");
                    btn.innerText = "Acceder al Sistema";
                    btn.disabled = false;
                }
            } catch (e) {
                errText.innerText = "Error de conexión con el servidor";
                errContainer.classList.remove("hidden");
                btn.innerText = "Acceder al Sistema";
                btn.disabled = false;
            }
        }

        // Permitir Login con tecla Enter
        document.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') login();
        });
    </script>
</body>

</html>
