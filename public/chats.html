<!-- public/chats.html -->

<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <title>Chats</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</head>

<body class="bg-slate-900 text-white h-screen flex">

    <!-- SIDEBAR -->

    <div class="w-80 bg-slate-800 border-r border-slate-700 overflow-y-auto">

        <h2 class="text-xl p-4 border-b border-slate-700">
            Conversaciones
        </h2>

        <div id="listaChats"></div>

    </div>

    <!-- CHAT -->

    <div class="flex-1 flex flex-col">

        <div id="chatHeader" class="p-4 border-b border-slate-700">
            Selecciona conversación
        </div>

        <div id="chatMensajes" class="flex-1 overflow-y-auto p-4 space-y-3"></div>

        <div class="p-4 border-t border-slate-700 flex gap-2">

            <input id="mensajeInput" class="flex-1 p-2 text-black rounded">

            <button onclick="enviarMensaje()" class="bg-green-600 px-4 rounded">

                Enviar

            </button>

        </div>

    </div>

    <script>

        const token = localStorage.getItem("token")

        async function initSupabase() {

            const cfg = await fetch("/config").then(r => r.json())

            return window.supabase.createClient(
                cfg.supabaseUrl,
                cfg.supabaseAnon
            )

        }

        let supabase

        initSupabase().then(client => {
            supabase = client
            escucharRealtime()
        })

        let clienteActual = null

        async function cargarChats() {

            const res = await fetch("/admin/conversaciones", {
                headers: { Authorization: "Bearer " + token }
            })

            const chats = await res.json()

            const cont = document.getElementById("listaChats")

            cont.innerHTML = chats.map(c => `

<div onclick="abrirChat('${c.id}','${c.telefono}')"
class="p-4 border-b border-slate-700 cursor-pointer hover:bg-slate-700">

${c.telefono}

</div>

`).join("")

        }

        async function abrirChat(id, telefono) {

            clienteActual = id

            document.getElementById("chatHeader").innerText = "Cliente " + telefono

            const res = await fetch("/admin/conversacion/" + id, {
                headers: { Authorization: "Bearer " + token }
            })

            const mensajes = await res.json()

            renderMensajes(mensajes)

        }

        function renderMensajes(mensajes) {

            const cont = document.getElementById("chatMensajes")

            cont.innerHTML = mensajes.map(m => `

<div class="${m.direccion === "out" ? "text-right" : ""}">

<span class="inline-block px-3 py-2 rounded
${m.direccion === "out" ? "bg-green-600" : "bg-slate-700"}">

${m.contenido}

</span>

</div>

`).join("")

        }

        async function enviarMensaje() {

            const texto = document.getElementById("mensajeInput").value

            await fetch("/admin/responder", {

                method: "POST",

                headers: {
                    "Content-Type": "application/json",
                    Authorization: "Bearer " + token
                },

                body: JSON.stringify({
                    cliente_id: clienteActual,
                    mensaje: texto
                })

            })

            document.getElementById("mensajeInput").value = ""

        }

        function escucharRealtime() {

            supabase

                .channel("mensajes-chat")

                .on(

                    "postgres_changes",

                    {

                        event: "INSERT",
                        schema: "public",
                        table: "mensajes"

                    },

                    payload => {

                        const mensaje = payload.new

                        if (mensaje.cliente_id === clienteActual) {

                            const cont = document.getElementById("chatMensajes")

                            cont.innerHTML += `

<div class="${mensaje.direccion === "out" ? "text-right" : ""}">

<span class="inline-block px-3 py-2 rounded
${mensaje.direccion === "out" ? "bg-green-600" : "bg-slate-700"}">

${mensaje.contenido}

</span>

</div>

`

                        }

                    }

                )

                .subscribe()

        }

        cargarChats()

        escucharRealtime()

    </script>

</body>

</html>
