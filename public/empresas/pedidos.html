<!-- public/empresas/pedidos.html -->

<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel Empresa | Pedidos</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>body{font-family:'DM Sans',sans-serif}.font-display{font-family:'Syne',sans-serif}::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:#1e293b;border-radius:10px}@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}.fade-in{animation:fadeIn .4s ease forwards}</style>
  <link rel="stylesheet" href="/theme.css">
</head>
<body class="bg-[#060a10] text-slate-300 h-screen overflow-hidden flex">
<div id="sidebarContainer" class="flex shrink-0"></div>

<main class="flex-1 overflow-y-auto p-8 fade-in">
  <div class="max-w-6xl mx-auto">
    <header class="mb-8 flex items-center justify-between">
      <div>
        <h1 class="text-2xl font-display font-bold text-white">Pedidos</h1>
        <p class="text-slate-500 text-sm mt-1">Gestión de guías y envíos.</p>
      </div>
      <div class="flex gap-3">
        <input id="buscar" placeholder="Buscar folio o cliente..." class="bg-slate-800 border border-slate-700 text-sm text-white rounded-xl px-4 py-2 outline-none focus:border-sky-500 transition w-56">
        <select id="filtroEstatus" class="bg-slate-800 border border-slate-700 text-sm text-white rounded-xl px-4 py-2 outline-none focus:border-sky-500 transition">
          <option value="">Todos</option>
          <option value="pendiente_pago">Pendiente pago</option>
          <option value="guia_enviada">Guía enviada</option>
          <option value="cancelado">Cancelado</option>
        </select>
        <button id="btnExportar" class="flex items-center gap-2 bg-slate-700 hover:bg-slate-600 text-white font-semibold px-4 py-2 rounded-xl transition text-sm">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
          CSV
        </button>
      </div>
    </header>

    <div class="bg-[#0a0f1a] border border-slate-800/60 rounded-2xl overflow-hidden">
      <div class="overflow-x-auto">
        <table class="w-full text-left text-sm">
          <thead class="bg-slate-900/40 text-slate-500 text-xs uppercase tracking-wider">
            <tr>
              <th class="px-5 py-3">Folio</th>
              <th class="px-5 py-3">Cliente</th>
              <th class="px-5 py-3">Servicio</th>
              <th class="px-5 py-3">Precio</th>
              <th class="px-5 py-3">Estatus</th>
              <th class="px-5 py-3">Fecha</th>
              <th class="px-5 py-3">Acciones</th>
            </tr>
          </thead>
          <tbody id="tablaPedidos" class="divide-y divide-slate-800/60"></tbody>
        </table>
      </div>
      <div id="loadingPedidos" class="p-8 text-center text-slate-500 text-sm">Cargando...</div>
    </div>
  </div>
</main>

<!-- MODAL ENVIAR GUÍA -->
<div id="modalGuia" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/70 backdrop-blur-sm">
  <div class="bg-[#0a0f1a] border border-slate-700 rounded-3xl p-8 w-full max-w-md shadow-2xl mx-4">
    <div class="flex justify-between items-center mb-6">
      <h2 class="text-xl font-display font-bold text-white">Enviar Guía</h2>
      <button id="btnCerrarGuia" class="text-slate-500 hover:text-white transition">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
      </button>
    </div>
    <p class="text-slate-400 text-sm mb-4">Folio: <span id="guiaFolio" class="text-sky-400 font-mono font-bold"></span></p>
    <div>
      <label class="text-xs text-slate-400 uppercase font-semibold">URL del PDF de la guía *</label>
      <input id="guiaUrl" class="mt-1 w-full bg-slate-800/50 border border-slate-700 rounded-xl px-4 py-2.5 text-white text-sm outline-none focus:border-sky-500 transition" placeholder="https://...">
    </div>
    <div id="errGuia" class="hidden mt-3 text-red-400 text-sm bg-red-400/10 px-4 py-2 rounded-xl border border-red-400/20"></div>
    <button id="btnEnviarGuia" class="w-full mt-5 bg-sky-500 hover:bg-sky-400 text-slate-900 font-bold py-3 rounded-xl transition text-sm">Enviar al Cliente</button>
  </div>
</div>

<!-- MODAL DETALLE PEDIDO -->
<div id="modalDetalle" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/70 backdrop-blur-sm">
  <div class="bg-[#0a0f1a] border border-slate-700 rounded-3xl p-8 w-full max-w-lg shadow-2xl mx-4 max-h-[90vh] overflow-y-auto">
    <div class="flex justify-between items-center mb-6">
      <h2 class="text-xl font-display font-bold text-white">Detalle del Pedido</h2>
      <button id="btnCerrarDetalle" class="text-slate-500 hover:text-white transition">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
      </button>
    </div>
    <div id="detalleContenido" class="space-y-4 text-sm"></div>
  </div>
</div>

<script src="/auth.js"></script>
<script src="/empresas/sidebar.js"></script>
<script>
  if (!requireRole("empresa", "usuario")) throw new Error();
  renderSidebar("/empresas/pedidos.html");

  // Cargar nombre empresa en sidebar
  fetch("/admin/empresa", { headers: { Authorization: "Bearer " + getToken() } })
    .then(r => r.json()).then(d => { if (d?.nombre && document.getElementById("empresaNombreSidebar")) document.getElementById("empresaNombreSidebar").textContent = d.nombre; }).catch(()=>{});

  const token = getToken();
  let todos = [];
  let folioActual = null;

  const STATUS_COLORS = {
    pendiente_pago: "bg-amber-500/10 text-amber-400 border-amber-500/20",
    guia_enviada:   "bg-sky-500/10 text-sky-400 border-sky-500/20",
    pendiente:      "bg-amber-500/10 text-amber-400 border-amber-500/20",
    cancelado:      "bg-red-500/10 text-red-400 border-red-500/20"
  };

  async function cargarPedidos() {
    const res = await fetch("/admin/pedidos", { headers: { Authorization: "Bearer " + token } });
    todos = await res.json();
    document.getElementById("loadingPedidos").classList.add("hidden");
    renderTabla(todos);
  }

  function renderTabla(pedidos) {
    const tbody = document.getElementById("tablaPedidos");
    if (!pedidos.length) {
      tbody.innerHTML = `<tr><td colspan="7" class="px-5 py-8 text-center text-slate-500">Sin pedidos.</td></tr>`;
      return;
    }
    tbody.innerHTML = pedidos.map(p => `
      <tr class="hover:bg-slate-800/20 transition-colors">
        <td class="px-5 py-3 font-mono text-sky-400 font-medium text-xs">${p.folio || " - "}</td>
        <td class="px-5 py-3 text-white">${p.telefono_cliente || p.cliente_whatsapp || " - "}</td>
        <td class="px-5 py-3">${p.servicio || " - "}</td>
        <td class="px-5 py-3 text-white font-medium">$${Number(p.precio || 0).toFixed(2)}</td>
        <td class="px-5 py-3">
          <span class="px-2 py-0.5 rounded-full text-[10px] font-bold uppercase border ${STATUS_COLORS[p.estatus] || 'bg-slate-700 text-slate-300 border-slate-600'}">
            ${p.estatus || " - "}
          </span>
        </td>
        <td class="px-5 py-3 text-slate-400 text-xs">${new Date(p.created_at).toLocaleDateString("es-MX")}</td>
        <td class="px-5 py-3 flex gap-2">
          <button data-p='${JSON.stringify(p).replace(/'/g,"&#39;")}' class="btn-detalle text-xs px-3 py-1.5 bg-slate-700 hover:bg-slate-600 rounded-lg transition text-white">Ver</button>
          <button data-folio="${p.folio}" class="btn-guia text-xs px-3 py-1.5 bg-sky-500/10 text-sky-400 hover:bg-sky-500/20 rounded-lg transition">Guía</button>
        </td>
      </tr>
    `).join("");

    document.querySelectorAll(".btn-detalle").forEach(btn => {
      btn.addEventListener("click", () => {
        const p = JSON.parse(btn.dataset.p);
        const d = p.datos_envio || {};
        document.getElementById("detalleContenido").innerHTML = `
          <div class="grid grid-cols-2 gap-4">
            <div><p class="text-xs text-slate-500 uppercase">Folio</p><p class="text-white font-mono font-bold">${p.folio}</p></div>
            <div><p class="text-xs text-slate-500 uppercase">Estatus</p><p class="text-sky-400 font-bold uppercase text-xs">${p.estatus}</p></div>
            <div><p class="text-xs text-slate-500 uppercase">Servicio</p><p class="text-white">${p.servicio}</p></div>
            <div><p class="text-xs text-slate-500 uppercase">Precio</p><p class="text-white font-bold">$${Number(p.precio||0).toFixed(2)}</p></div>
          </div>
          ${d.origen ? `
          <div class="border-t border-slate-800 pt-4">
            <p class="text-xs text-slate-400 uppercase font-semibold mb-2">Origen</p>
            <p class="text-white">${d.origen.nombre}</p>
            <p class="text-slate-400 text-xs">${d.origen.calle}, ${d.origen.colonia}</p>
            <p class="text-slate-400 text-xs">${d.origen.ciudad} CP ${d.origen.cp} · ${d.origen.cel}</p>
          </div>
          <div class="border-t border-slate-800 pt-4">
            <p class="text-xs text-slate-400 uppercase font-semibold mb-2">Destino</p>
            <p class="text-white">${d.destino.nombre}</p>
            <p class="text-slate-400 text-xs">${d.destino.calle}, ${d.destino.colonia}</p>
            <p class="text-slate-400 text-xs">${d.destino.ciudad} CP ${d.destino.cp} · ${d.destino.cel}</p>
          </div>
          <div class="border-t border-slate-800 pt-4">
            <p class="text-xs text-slate-400 uppercase font-semibold mb-2">Paquete</p>
            <p class="text-slate-300 text-xs">Medidas: ${d.paquete?.medidas} · Peso: ${d.paquete?.peso} kg</p>
            <p class="text-slate-300 text-xs">Contenido: ${d.paquete?.contenido}</p>
          </div>` : ""}
          ${p.guia_url ? `<div class="border-t border-slate-800 pt-4"><a href="${p.guia_url}" target="_blank" class="text-sky-400 text-sm hover:underline"> Ver guía PDF</a></div>` : ""}
        `;
        document.getElementById("modalDetalle").classList.remove("hidden");
      });
    });
    document.querySelectorAll(".btn-guia").forEach(btn => {
      btn.addEventListener("click", () => {
        folioActual = btn.dataset.folio;
        document.getElementById("guiaFolio").textContent = folioActual;
        document.getElementById("guiaUrl").value = "";
        document.getElementById("errGuia").classList.add("hidden");
        document.getElementById("modalGuia").classList.remove("hidden");
      });
    });
  }

  // Filtros
  function aplicarFiltros() {
    const texto  = document.getElementById("buscar").value.toLowerCase();
    const estatus = document.getElementById("filtroEstatus").value;
    renderTabla(todos.filter(p => {
      const matchTexto  = !texto || (p.folio||"").toLowerCase().includes(texto) || (p.telefono_cliente||p.cliente_whatsapp||"").toLowerCase().includes(texto);
      const matchEstatus = !estatus || p.estatus === estatus;
      return matchTexto && matchEstatus;
    }));
  }

  document.getElementById("buscar").addEventListener("input", aplicarFiltros);
  document.getElementById("filtroEstatus").addEventListener("change", aplicarFiltros);

  // Exportar CSV
  document.getElementById("btnExportar").addEventListener("click", () => {
    const header = "Folio,Cliente,Servicio,Precio,Estatus,Fecha";
    const rows = todos.map(p => `"${p.folio||""}","${p.telefono_cliente||p.cliente_whatsapp||""}","${p.servicio||""}","${Number(p.precio||0).toFixed(2)}","${p.estatus||""}","${new Date(p.created_at).toLocaleDateString("es-MX")}"`);
    const blob = new Blob([[header,...rows].join("\n")], { type:"text/csv;charset=utf-8;" });
    const a = Object.assign(document.createElement("a"), { href: URL.createObjectURL(blob), download: `pedidos_${new Date().toISOString().slice(0,10)}.csv` });
    a.click();
  });

  // Modal guía
  document.getElementById("btnCerrarGuia").addEventListener("click", () => document.getElementById("modalGuia").classList.add("hidden"));
  document.getElementById("btnCerrarDetalle").addEventListener("click", () => document.getElementById("modalDetalle").classList.add("hidden"));
  document.getElementById("btnEnviarGuia").addEventListener("click", async () => {
    const err = document.getElementById("errGuia");
    err.classList.add("hidden");
    const urlPdf = document.getElementById("guiaUrl").value.trim();
    if (!urlPdf) { err.textContent = "La URL del PDF es requerida."; err.classList.remove("hidden"); return; }
    const res = await fetch("/admin/enviar-guia", {
      method: "POST",
      headers: { "Content-Type": "application/json", Authorization: "Bearer " + token },
      body: JSON.stringify({ folio: folioActual, urlPdf })
    });
    const data = await res.json();
    if (!res.ok) { err.textContent = data.error || "Error al enviar."; err.classList.remove("hidden"); return; }
    document.getElementById("modalGuia").classList.add("hidden");
    cargarPedidos();
  });

  cargarPedidos();
</script>
<script src="/theme.js"></script>
</body>
</html>
