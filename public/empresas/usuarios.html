<!-- public/empresas/usuarios.html -->

<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel Empresa | Usuarios</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>body{font-family:'DM Sans',sans-serif}.font-display{font-family:'Syne',sans-serif}::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:#1e293b;border-radius:10px}@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}.fade-in{animation:fadeIn .4s ease forwards}</style>
  <link rel="stylesheet" href="/theme.css">
</head>
<body class="bg-[#060a10] text-slate-300 h-screen overflow-hidden flex">
<div id="sidebarContainer" class="flex shrink-0"></div>

<main class="flex-1 overflow-y-auto p-8 fade-in">
  <div class="max-w-5xl mx-auto">
    <header class="mb-8 flex items-center justify-between">
      <div>
        <h1 class="text-2xl font-display font-bold text-white">Usuarios</h1>
        <p class="text-slate-500 text-sm mt-1">Empleados con acceso al panel.</p>
      </div>
      <button id="btnNuevo" class="flex items-center gap-2 bg-sky-500 hover:bg-sky-400 text-slate-900 font-semibold px-5 py-2.5 rounded-xl transition shadow-lg shadow-sky-500/20 text-sm">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v16m8-8H4"/></svg>
        Nuevo Usuario
      </button>
    </header>

    <div class="grid grid-cols-3 gap-4 mb-8">
      <div class="bg-[#0a0f1a] border border-slate-800/60 rounded-2xl p-5 text-center">
        <p id="statTotal" class="text-3xl font-display font-bold text-white"> - </p>
        <p class="text-xs text-slate-500 mt-1">Total usuarios</p>
      </div>
      <div class="bg-[#0a0f1a] border border-slate-800/60 rounded-2xl p-5 text-center">
        <p id="statActivos" class="text-3xl font-display font-bold text-sky-400"> - </p>
        <p class="text-xs text-slate-500 mt-1">Activos</p>
      </div>
      <div class="bg-[#0a0f1a] border border-slate-800/60 rounded-2xl p-5 text-center">
        <p id="statInactivos" class="text-3xl font-display font-bold text-slate-500"> - </p>
        <p class="text-xs text-slate-500 mt-1">Inactivos</p>
      </div>
    </div>

    <div class="bg-[#0a0f1a] border border-slate-800/60 rounded-2xl overflow-hidden">
      <table class="w-full text-left text-sm">
        <thead class="bg-slate-900/40 text-slate-500 text-xs uppercase tracking-wider">
          <tr>
            <th class="px-5 py-3">Nombre</th>
            <th class="px-5 py-3">Usuario</th>
            <th class="px-5 py-3">Correo</th>
            <th class="px-5 py-3">Estado</th>
            <th class="px-5 py-3">Alta</th>
            <th class="px-5 py-3">Acciones</th>
          </tr>
        </thead>
        <tbody id="tablaUsuarios" class="divide-y divide-slate-800/60"></tbody>
      </table>
      <div id="loadingUsuarios" class="p-8 text-center text-slate-500 text-sm">Cargando...</div>
    </div>
  </div>
</main>

<!-- MODAL CREAR/EDITAR USUARIO -->
<div id="modal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/70 backdrop-blur-sm">
  <div class="bg-[#0a0f1a] border border-slate-700 rounded-3xl p-8 w-full max-w-md shadow-2xl mx-4">
    <div class="flex justify-between items-center mb-6">
      <h2 id="modalTitulo" class="text-xl font-display font-bold text-white">Nuevo Usuario</h2>
      <button id="btnCerrar" class="text-slate-500 hover:text-white transition">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
      </button>
    </div>
    <div class="space-y-4">
      <div>
        <label class="text-xs text-slate-400 uppercase font-semibold">Nombre Completo *</label>
        <input id="f_nombre" class="mt-1 w-full bg-slate-800/50 border border-slate-700 rounded-xl px-4 py-2.5 text-white text-sm outline-none focus:border-sky-500 transition">
      </div>
      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="text-xs text-slate-400 uppercase font-semibold">Usuario *</label>
          <input id="f_username" class="mt-1 w-full bg-slate-800/50 border border-slate-700 rounded-xl px-4 py-2.5 text-white text-sm outline-none focus:border-sky-500 transition">
        </div>
        <div>
          <label class="text-xs text-slate-400 uppercase font-semibold">Contraseña <span id="passLabel" class="text-slate-500 normal-case font-normal">(requerida)</span></label>
          <input id="f_password" type="password" class="mt-1 w-full bg-slate-800/50 border border-slate-700 rounded-xl px-4 py-2.5 text-white text-sm outline-none focus:border-sky-500 transition">
        </div>
      </div>
      <div>
        <label class="text-xs text-slate-400 uppercase font-semibold">Correo</label>
        <input id="f_correo" type="email" class="mt-1 w-full bg-slate-800/50 border border-slate-700 rounded-xl px-4 py-2.5 text-white text-sm outline-none focus:border-sky-500 transition">
      </div>
      <div>
        <label class="text-xs text-slate-400 uppercase font-semibold">Teléfono</label>
        <input id="f_telefono" class="mt-1 w-full bg-slate-800/50 border border-slate-700 rounded-xl px-4 py-2.5 text-white text-sm outline-none focus:border-sky-500 transition">
      </div>
      <div id="errModal" class="hidden text-red-400 text-sm bg-red-400/10 px-4 py-2 rounded-xl border border-red-400/20"></div>
      <button id="btnGuardar" class="w-full bg-sky-500 hover:bg-sky-400 text-slate-900 font-bold py-3 rounded-xl transition text-sm">Crear Usuario</button>
    </div>
  </div>
</div>

<script src="/auth.js"></script>
<script src="/empresas/sidebar.js"></script>
<script>
  if (!requireRole("empresa")) throw new Error();
  renderSidebar("/empresas/usuarios.html");

  const token = getToken();
  const user  = getUser();
  let empresaId = user?.empresa_id;
  let editUserId = null;

  fetch("/admin/empresa", { headers: { Authorization: "Bearer " + token } })
    .then(r => r.json()).then(d => {
      if (!empresaId && d?.id) empresaId = d.id;
      if (d?.nombre && document.getElementById("empresaNombreSidebar")) document.getElementById("empresaNombreSidebar").textContent = d.nombre;
    }).catch(()=>{});

  async function cargarUsuarios() {
    if (!empresaId) { setTimeout(cargarUsuarios, 300); return; }
    const res  = await fetch(`/empresas/${empresaId}/usuarios`, { headers: { Authorization: "Bearer " + token } });
    const data = await res.json();
    document.getElementById("loadingUsuarios").classList.add("hidden");

    document.getElementById("statTotal").textContent    = data.length;
    document.getElementById("statActivos").textContent  = data.filter(u => u.activo).length;
    document.getElementById("statInactivos").textContent = data.filter(u => !u.activo).length;

    const tbody = document.getElementById("tablaUsuarios");
    if (!data.length) { tbody.innerHTML = `<tr><td colspan="6" class="px-5 py-8 text-center text-slate-500">Sin usuarios registrados.</td></tr>`; return; }
    tbody.innerHTML = data.map(u => `
      <tr class="hover:bg-slate-800/20 transition-colors">
        <td class="px-5 py-3 text-white">${u.nombre_completo || " - "}</td>
        <td class="px-5 py-3 text-slate-400 font-mono text-xs">${u.username}</td>
        <td class="px-5 py-3 text-slate-400">${u.correo || " - "}</td>
        <td class="px-5 py-3">
          <span class="px-2 py-0.5 rounded-full text-[10px] font-bold uppercase border ${u.activo ? 'bg-sky-500/10 text-sky-400 border-sky-500/20' : 'bg-red-500/10 text-red-400 border-red-500/20'}">
            ${u.activo ? "Activo" : "Inactivo"}
          </span>
        </td>
        <td class="px-5 py-3 text-slate-400 text-xs">${new Date(u.created_at).toLocaleDateString("es-MX")}</td>
        <td class="px-5 py-3 flex gap-2">
          <button data-u='${JSON.stringify({id:u.id,nombre_completo:u.nombre_completo,username:u.username,correo:u.correo||"",telefono:u.telefono||""}).replace(/'/g,"&#39;")}' class="btn-edit text-xs px-3 py-1.5 bg-slate-700 hover:bg-slate-600 rounded-lg transition text-white">Editar</button>
          <button data-id="${u.id}" data-activo="${u.activo}" class="btn-toggle text-xs px-3 py-1.5 rounded-lg transition ${u.activo ? 'bg-red-500/10 text-red-400 hover:bg-red-500/20' : 'bg-sky-500/10 text-sky-400 hover:bg-sky-500/20'}">
            ${u.activo ? "Desactivar" : "Activar"}
          </button>
        </td>
      </tr>
    `).join("");

    document.querySelectorAll(".btn-edit").forEach(btn => {
      btn.addEventListener("click", () => {
        const u = JSON.parse(btn.dataset.u);
        editUserId = u.id;
        document.getElementById("modalTitulo").textContent = "Editar Usuario";
        document.getElementById("passLabel").textContent = "(dejar vacío para no cambiar)";
        document.getElementById("f_nombre").value   = u.nombre_completo;
        document.getElementById("f_username").value = u.username;
        document.getElementById("f_password").value = "";
        document.getElementById("f_correo").value   = u.correo;
        document.getElementById("f_telefono").value = u.telefono;
        document.getElementById("btnGuardar").textContent = "Guardar Cambios";
        document.getElementById("modal").classList.remove("hidden");
      });
    });
    document.querySelectorAll(".btn-toggle").forEach(btn => {
      btn.addEventListener("click", async () => {
        await fetch(`/empresas/${empresaId}/usuarios/${btn.dataset.id}`, {
          method: "PUT",
          headers: { "Content-Type": "application/json", Authorization: "Bearer " + token },
          body: JSON.stringify({ activo: btn.dataset.activo !== "true" })
        });
        cargarUsuarios();
      });
    });
  }

  document.getElementById("btnNuevo").addEventListener("click", () => {
    editUserId = null;
    document.getElementById("modalTitulo").textContent = "Nuevo Usuario";
    document.getElementById("passLabel").textContent = "(requerida)";
    document.getElementById("btnGuardar").textContent = "Crear Usuario";
    ["f_nombre","f_username","f_password","f_correo","f_telefono"].forEach(id => document.getElementById(id).value = "");
    document.getElementById("errModal").classList.add("hidden");
    document.getElementById("modal").classList.remove("hidden");
  });
  document.getElementById("btnCerrar").addEventListener("click", () => document.getElementById("modal").classList.add("hidden"));

  document.getElementById("btnGuardar").addEventListener("click", async () => {
    const err = document.getElementById("errModal");
    err.classList.add("hidden");
    const body = {
      nombre_completo: document.getElementById("f_nombre").value.trim(),
      username:        document.getElementById("f_username").value.trim(),
      password:        document.getElementById("f_password").value,
      correo:          document.getElementById("f_correo").value.trim(),
      telefono:        document.getElementById("f_telefono").value.trim()
    };
    if (!body.nombre_completo || !body.username || (!editUserId && !body.password)) {
      err.textContent = "Nombre, usuario y contraseña son obligatorios.";
      err.classList.remove("hidden"); return;
    }
    const url    = editUserId ? `/empresas/${empresaId}/usuarios/${editUserId}` : `/empresas/${empresaId}/usuarios`;
    const method = editUserId ? "PUT" : "POST";
    if (!body.password) delete body.password;
    const res  = await fetch(url, { method, headers: { "Content-Type": "application/json", Authorization: "Bearer " + token }, body: JSON.stringify(body) });
    const data = await res.json();
    if (!res.ok) { err.textContent = data.error || "Error al guardar."; err.classList.remove("hidden"); return; }
    document.getElementById("modal").classList.add("hidden");
    cargarUsuarios();
  });

  cargarUsuarios();
</script>
<script src="/theme.js"></script>
</body>
</html>
