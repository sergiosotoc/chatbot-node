<!-- public/chats.html -->
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel Empresa | Mensajes</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>body{font-family:'DM Sans',sans-serif}.font-display{font-family:'Syne',sans-serif}::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:#1e293b;border-radius:10px}</style>
  <link rel="stylesheet" href="/theme.css">
</head>
<body class="bg-[#060a10] text-slate-300 h-screen overflow-hidden flex">
<div id="sidebarContainer" class="flex shrink-0"></div>

<!-- LISTA CHATS -->
<div class="w-72 bg-[#0a0f1a] border-r border-slate-800/60 flex flex-col">
  <div class="p-4 border-b border-slate-800/60">
    <h2 class="text-base font-display font-bold text-white">Conversaciones</h2>
    <input id="buscarChat" placeholder="Buscar..." class="mt-3 w-full bg-slate-800 border border-slate-700 text-xs text-white rounded-xl px-3 py-2 outline-none focus:border-sky-500 transition">
  </div>
  <div id="listaChats" class="flex-1 overflow-y-auto"></div>
</div>

<!-- ÁREA CHAT -->
<div class="flex-1 flex flex-col">
  <div id="chatHeader" class="p-4 border-b border-slate-800/60 text-slate-500 text-sm">
    Selecciona una conversación
  </div>
  <div id="chatMensajes" class="flex-1 overflow-y-auto p-5 space-y-3"></div>
  <div id="chatInput" class="hidden p-4 border-t border-slate-800/60 flex gap-2">
    <input id="mensajeInput" class="flex-1 bg-slate-800 border border-slate-700 rounded-xl px-4 py-2.5 text-white text-sm outline-none focus:border-sky-500 transition" placeholder="Escribe un mensaje...">
    <button id="btnEnviar" class="bg-sky-500 hover:bg-sky-400 text-slate-900 font-semibold px-5 rounded-xl transition text-sm">Enviar</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="/auth.js"></script>
<script src="/empresas/sidebar.js"></script>
<script>
  if (!requireRole("empresa", "usuario")) throw new Error();
  renderSidebar("/empresas/chats.html");

  fetch("/admin/empresa", { headers: { Authorization: "Bearer " + getToken() } })
    .then(r => r.json()).then(d => { if (d?.nombre && document.getElementById("empresaNombreSidebar")) document.getElementById("empresaNombreSidebar").textContent = d.nombre; }).catch(()=>{});

  const token = getToken();
  let clienteActual = null;
  let supabaseClient = null;
  let todosChats = [];

  async function initSupabase() {
    const cfg = await fetch("/config").then(r => r.json());
    supabaseClient = window.supabase.createClient(cfg.supabaseUrl, cfg.supabaseAnon);
    escucharRealtime();
  }

  async function cargarChats() {
    const res  = await fetch("/admin/conversaciones", { headers: { Authorization: "Bearer " + token } });
    todosChats = await res.json();
    renderListaChats(todosChats);
  }

  function renderListaChats(chats) {
    const cont = document.getElementById("listaChats");
    if (!chats.length) { cont.innerHTML = `<p class="p-4 text-slate-500 text-xs">Sin conversaciones.</p>`; return; }
    cont.innerHTML = chats.map(c => `
      <div data-id="${c.id}" data-tel="${c.telefono}" class="chat-item p-4 border-b border-slate-800/40 cursor-pointer hover:bg-slate-800/40 transition flex items-center gap-3 ${clienteActual === c.id ? 'bg-sky-500/10 border-l-2 border-l-sky-500' : ''}">
        <div class="w-9 h-9 rounded-full bg-sky-500/10 border border-sky-500/20 flex items-center justify-center text-sky-400 font-bold text-xs shrink-0">${c.telefono.slice(-2)}</div>
        <p class="text-white text-sm font-medium truncate">${c.telefono}</p>
      </div>
    `).join("");
    document.querySelectorAll(".chat-item").forEach(el => {
      el.addEventListener("click", () => abrirChat(el.dataset.id, el.dataset.tel));
    });
  }

  async function abrirChat(id, telefono) {
    clienteActual = id;
    document.getElementById("chatHeader").innerHTML = `
      <div class="flex items-center gap-3">
        <div class="w-8 h-8 rounded-full bg-sky-500/10 border border-sky-500/20 flex items-center justify-center text-sky-400 text-xs font-bold">${telefono.slice(-2)}</div>
        <span class="text-white font-medium">${telefono}</span>
      </div>`;
    document.getElementById("chatInput").classList.remove("hidden");
    renderListaChats(todosChats);
    const res = await fetch("/admin/conversacion/" + id, { headers: { Authorization: "Bearer " + token } });
    const mensajes = await res.json();
    renderMensajes(mensajes);
  }

  function renderMensajes(mensajes) {
    const cont = document.getElementById("chatMensajes");
    if (!mensajes.length) { cont.innerHTML = `<p class="text-center text-slate-500 text-sm py-8">Sin mensajes.</p>`; return; }
    cont.innerHTML = mensajes.map(m => `
      <div class="flex ${m.direccion === 'out' ? 'justify-end' : 'justify-start'}">
        <div class="max-w-xs lg:max-w-md px-4 py-2.5 rounded-2xl text-sm ${m.direccion === 'out' ? 'bg-sky-500 text-slate-900 rounded-br-sm' : 'bg-slate-700/70 text-slate-100 rounded-bl-sm'}">
          ${m.contenido}
          <div class="text-[10px] mt-1 ${m.direccion === 'out' ? 'text-slate-700' : 'text-slate-400'}">${new Date(m.created_at).toLocaleTimeString('es-MX',{hour:'2-digit',minute:'2-digit'})}</div>
        </div>
      </div>
    `).join("");
    cont.scrollTop = cont.scrollHeight;
  }

  async function enviarMensaje() {
    if (!clienteActual) return;
    const input = document.getElementById("mensajeInput");
    const texto = input.value.trim();
    if (!texto) return;
    input.value = "";
    await fetch("/admin/responder", {
      method: "POST",
      headers: { "Content-Type": "application/json", Authorization: "Bearer " + token },
      body: JSON.stringify({ cliente_id: clienteActual, mensaje: texto })
    });
  }

  function escucharRealtime() {
    if (!supabaseClient) return;
    supabaseClient.channel("empresa-chats").on("postgres_changes",
      { event: "INSERT", schema: "public", table: "mensajes" },
      payload => {
        const m = payload.new;
        if (m.cliente_id !== clienteActual) return;
        const cont = document.getElementById("chatMensajes");
        const div = document.createElement("div");
        div.className = `flex ${m.direccion === 'out' ? 'justify-end' : 'justify-start'}`;
        div.innerHTML = `<div class="max-w-xs px-4 py-2.5 rounded-2xl text-sm ${m.direccion === 'out' ? 'bg-sky-500 text-slate-900 rounded-br-sm' : 'bg-slate-700/70 text-slate-100 rounded-bl-sm'}">${m.contenido}</div>`;
        cont.appendChild(div);
        cont.scrollTop = cont.scrollHeight;
      }).subscribe();
  }

  document.getElementById("mensajeInput").addEventListener("keypress", e => { if (e.key === "Enter") enviarMensaje(); });
  document.getElementById("btnEnviar").addEventListener("click", enviarMensaje);
  document.getElementById("buscarChat").addEventListener("input", e => {
    const q = e.target.value.toLowerCase();
    renderListaChats(todosChats.filter(c => c.telefono.includes(q)));
  });

  cargarChats();
  initSupabase();
</script>
<script src="/theme.js"></script>
</body>
</html>
