<!-- public/dashboard.html -->
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AHSE Admin | SaaS Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen">

    <div class="flex">
        <aside class="w-64 bg-slate-800 h-screen sticky top-0 border-r border-slate-700 p-4">
            <h2 class="text-2xl font-bold text-green-400 mb-8 flex items-center">
                <i class="fas fa-shipping-fast mr-2"></i> AHSE Admin
            </h2>
            <nav class="space-y-2">
                <a href="#" class="block p-3 bg-slate-700 rounded-lg text-white">Dashboard</a>
                <a href="#" class="block p-3 hover:bg-slate-700 rounded-lg text-slate-400 transition">Pedidos</a>
                <a href="#" class="block p-3 hover:bg-slate-700 rounded-lg text-slate-400 transition">Configuración</a>
            </nav>
            <div class="absolute bottom-4 left-4 right-4">
                <button onclick="logout()" class="w-full p-2 bg-red-500/10 text-red-500 rounded hover:bg-red-500 hover:text-white transition">
                    Cerrar Sesión
                </button>
            </div>
        </aside>

        <main class="flex-1 p-8">
            <header class="flex justify-between items-center mb-8">
                <div>
                    <h1 class="text-3xl font-bold">Resumen General</h1>
                    <p class="text-slate-400" id="admin-welcome"></p>
                </div>
                <div class="bg-slate-800 px-4 py-2 rounded-lg border border-slate-700">
                    Status: <span class="text-green-400" id="health-status">Checking...</span>
                </div>
            </header>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                <div class="bg-slate-800 p-6 rounded-xl border border-slate-700">
                    <p class="text-slate-400 text-sm">Pedidos Hoy</p>
                    <h3 class="text-3xl font-bold" id="kpi-today">0</h3>
                </div>
                <div class="bg-slate-800 p-6 rounded-xl border border-slate-700">
                    <p class="text-slate-400 text-sm">Pendientes Pago</p>
                    <h3 class="text-3xl font-bold text-yellow-400" id="kpi-pending">0</h3>
                </div>
                <div class="bg-slate-800 p-6 rounded-xl border border-slate-700">
                    <p class="text-slate-400 text-sm">Uptime Sistema</p>
                    <h3 class="text-3xl font-bold text-blue-400" id="kpi-uptime">0h</h3>
                </div>
            </div>

            <div class="bg-slate-800 rounded-xl border border-slate-700 overflow-hidden">
                <div class="p-4 border-b border-slate-700 flex justify-between items-center">
                    <h2 class="font-bold">Pedidos Recientes</h2>
                    <button onclick="loadDashboard()" class="text-sm text-blue-400 hover:underline">Actualizar</button>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead class="bg-slate-700/50 text-slate-400 text-sm uppercase">
                            <tr>
                                <th class="p-4">Folio</th>
                                <th class="p-4">Cliente</th>
                                <th class="p-4">Servicio/Costo</th>
                                <th class="p-4">Estatus</th>
                                <th class="p-4">Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="pedidos-table-body">
                            </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script>
        const token = localStorage.getItem("token");
        if (!token) window.location.href = "/login.html";

        async function loadDashboard() {
            try {
                const res = await fetch("/admin/dashboard", {
                    headers: { "Authorization": "Bearer " + token }
                });

                if (res.status === 401) logout();
                
                const data = await res.json();
                
                // Actualizar UI
                document.getElementById("admin-welcome").innerText = `Hola, ${data.user.username}`;
                document.getElementById("kpi-today").innerText = data.stats.totalHoy;
                document.getElementById("kpi-pending").innerText = data.stats.pendientes;
                document.getElementById("kpi-uptime").innerText = (data.health.uptime / 3600).toFixed(1) + "h";
                document.getElementById("health-status").innerText = data.health.status;

                const tableBody = document.getElementById("pedidos-table-body");
                tableBody.innerHTML = data.pedidos.map(p => `
                    <tr class="border-b border-slate-700 hover:bg-slate-700/30 transition">
                        <td class="p-4 font-mono text-blue-400">${p.folio}</td>
                        <td class="p-4">${p.cliente}</td>
                        <td class="p-4 text-sm">${p.servicio}</td>
                        <td class="p-4">
                            <span class="px-2 py-1 rounded text-xs ${p.estatus === 'Pendiente' ? 'bg-yellow-500/20 text-yellow-500' : 'bg-green-500/20 text-green-500'}">
                                ${p.estatus}
                            </span>
                        </td>
                        <td class="p-4">
                            <button class="bg-slate-600 px-3 py-1 rounded text-xs hover:bg-blue-600 transition">Ver</button>
                        </td>
                    </tr>
                `).join('');

            } catch (err) {
                console.error("Error al cargar dashboard", err);
            }
        }

        function logout() {
            localStorage.removeItem("token");
            window.location.href = "/login.html";
        }

        loadDashboard();
    </script>
</body>
</html>
