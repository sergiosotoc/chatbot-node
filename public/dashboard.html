<!-- public/dashboard.html -->

<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AHSE | Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 10px;
        }
    </style>
</head>

<body class="bg-[#0b0f1a] text-slate-300 h-screen overflow-hidden">
    <div class="flex h-full">
        <aside class="w-64 bg-[#0f172a] border-r border-slate-800 flex flex-col shrink-0">
            <div class="p-6 flex items-center gap-3">
                <div
                    class="w-8 h-8 bg-green-500 rounded-lg flex items-center justify-center shadow-lg shadow-green-500/20">
                    <svg class="w-5 h-5 text-slate-900" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-14L4 7m8 4v10M4 7v10l8 4"></path>
                    </svg>
                </div>
                <span class="text-xl font-bold text-white tracking-tight">AHSE Admin</span>
            </div>

            <nav class="flex-1 px-4 space-y-1 mt-4">
                <a href="/dashboard.html"
                    class="flex items-center gap-3 px-3 py-2 text-white bg-slate-800/50 rounded-xl border border-white/5 transition">
                    Dashboard
                </a>
                <a href="/pedidos.html"
                    class="flex items-center gap-3 px-3 py-2 hover:bg-slate-800/50 rounded-xl transition">Pedidos</a>
                <a href="/chats.html"
                    class="flex items-center gap-3 px-3 py-2 hover:bg-slate-800/50 rounded-xl transition">Mensajes</a>
                <a href="/clientes.html"
                    class="flex items-center gap-3 px-3 py-2 hover:bg-slate-800/50 rounded-xl transition">Clientes</a>
                <a href="/empresa.html"
                    class="flex items-center gap-3 px-3 py-2 hover:bg-slate-800/50 rounded-xl transition">Configuración</a>
            </nav>

            <div class="p-4 border-t border-slate-800">
                <button onclick="logout()"
                    class="flex items-center gap-3 w-full px-3 py-2 text-slate-400 hover:text-red-400 transition-colors">
                    Cerrar sesión
                </button>
            </div>
        </aside>

        <main class="flex-1 overflow-y-auto p-8">
            <header class="mb-10">
                <h1 class="text-3xl font-bold text-white">Resumen Operativo</h1>
                <p class="text-slate-500">Estado actual de la logística y sistema.</p>
            </header>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
                <div class="bg-[#0f172a] p-6 rounded-2xl border border-slate-800">
                    <p class="text-sm text-slate-500 font-medium uppercase tracking-wider">Pedidos hoy</p>
                    <h2 id="today" class="text-4xl font-bold text-white mt-2">0</h2>
                </div>
                <div class="bg-[#0f172a] p-6 rounded-2xl border border-slate-800">
                    <p class="text-sm text-slate-500 font-medium uppercase tracking-wider">Pendientes</p>
                    <h2 id="pending" class="text-4xl font-bold text-amber-500 mt-2">0</h2>
                </div>
                <div class="bg-[#0f172a] p-6 rounded-2xl border border-slate-800">
                    <p class="text-sm text-slate-500 font-medium uppercase tracking-wider">Uptime Sistema</p>
                    <h2 id="uptime" class="text-4xl font-bold text-green-500 mt-2">0</h2>
                </div>
            </div>

            <div class="bg-[#0f172a] rounded-2xl border border-slate-800 overflow-hidden shadow-xl">
                <div class="p-6 border-b border-slate-800">
                    <h3 class="font-semibold text-white">Pedidos Recientes</h3>
                </div>
                <table class="w-full text-left border-collapse">
                    <thead class="bg-slate-800/30 text-slate-400 text-xs uppercase">
                        <tr>
                            <th class="p-4">Folio</th>
                            <th class="p-4">Cliente</th>
                            <th class="p-4">Servicio</th>
                            <th class="p-4">Estatus</th>
                        </tr>
                    </thead>
                    <tbody id="tabla" class="divide-y divide-slate-800 text-sm"></tbody>
                </table>
            </div>
        </main>
    </div>

    <script>
        const token = localStorage.getItem("token");
        if (!token) window.location = "/login.html";

        async function loadDashboard() {
            try {
                const res = await fetch("/admin/dashboard", { headers: { Authorization: "Bearer " + token } });
                const data = await res.json();

                document.getElementById("today").innerText = data.stats.totalHoy;
                document.getElementById("pending").innerText = data.stats.pendientes;
                document.getElementById("uptime").innerText = (data.health.uptime / 3600).toFixed(1) + "h";

                const tbody = document.getElementById("tabla");
                tbody.innerHTML = data.pedidos.map(p => `
                    <tr class="hover:bg-slate-800/20 transition-colors">
                        <td class="p-4 font-mono text-green-500 font-medium">${p.folio}</td>
                        <td class="p-4 text-white">${p.cliente_whatsapp}</td>
                        <td class="p-4 font-medium">${p.servicio}</td>
                        <td class="p-4">
                            <span class="px-2 py-1 rounded-full text-[10px] font-bold uppercase ${p.estatus === 'pendiente' ? 'bg-amber-500/10 text-amber-500 border border-amber-500/20' : 'bg-green-500/10 text-green-500 border border-green-500/20'}">
                                ${p.estatus}
                            </span>
                        </td>
                    </tr>
                `).join("");
            } catch (e) { console.error(e); }
        }

        function logout() { localStorage.removeItem("token"); window.location = "/login.html"; }
        loadDashboard();
    </script>
</body>

</html>
