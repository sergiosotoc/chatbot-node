<!-- public/operadores.html -->

<!DOCTYPE html>
<html>

<head>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-900 text-white p-10">

    <h1 class="text-3xl mb-6">Operadores</h1>

    <div class="mb-6">

        <input id="username" placeholder="usuario" class="text-black p-2">

        <input id="password" type="password" placeholder="password" class="text-black p-2">

        <select id="rol" class="text-black p-2">
            <option value="agente">Agente</option>
            <option value="admin">Admin</option>
        </select>

        <button onclick="crear()" class="bg-green-500 p-2">Crear</button>

    </div>

    <script>

        const token = localStorage.getItem("token");

        async function crear() {

            const username = document.getElementById("username").value;
            const password = document.getElementById("password").value;
            const rol = document.getElementById("rol").value;

            await fetch("/admin/operadores", {

                method: "POST",

                headers: {
                    "Content-Type": "application/json",
                    Authorization: "Bearer " + token
                },

                body: JSON.stringify({
                    username,
                    password,
                    rol
                })

            });

            alert("Operador creado");

        }

    </script>

</body>

</html>
